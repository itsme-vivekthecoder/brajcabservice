<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://brajcab.com/gallery.html">
  <meta property="og:title" content="Gallery | BrajCab Taxi Fleet in Mathura & Vrindavan">
  <meta property="og:description" content="Browse the BrajCab taxi fleet gallery. See our premium cars for Mathura, Vrindavan, airport transfers, temple tours and pilgrimage travel.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://brajcab.com/gallery.html">
  <meta property="og:image" content="https://brajcab.com/photos/car2.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gallery | BrajCab Taxi Fleet in Mathura & Vrindavan">
  <meta name="twitter:description" content="Browse the BrajCab taxi fleet gallery. See our premium cars for Mathura, Vrindavan, airport transfers, temple tours and pilgrimage travel.">
  <meta name="twitter:image" content="https://brajcab.com/photos/car2.jpg">
  <style>
    body{margin:0;font-family:Inter,sans-serif;background:#071021;color:#fff;}
    .gallery-section{padding:120px 8% 60px;text-align:center;}
    .gallery-section h2{color:#ffd54f;margin-bottom:30px;font-size:2.4rem;}
    .gallery-section p{color:#ccc;margin-bottom:40px;font-size:1.05rem;max-width:800px;margin-left:auto;margin-right:auto;}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
    .gallery-grid img{width:100%;height:220px;object-fit:cover;border-radius:15px;cursor:pointer;transition:0.3s;}
    .gallery-grid img:hover{transform:scale(1.05);}
    #lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:2000;}
    #lightbox-img{max-width:90%;max-height:85%;border-radius:15px;}
    #close{position:absolute;top:20px;right:30px;font-size:40px;color:white;cursor:pointer;}
    #prev,#next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.2);border:none;color:white;font-size:30px;padding:10px 15px;cursor:pointer;border-radius:50%;}
    #prev{left:30px;}#next{right:30px;}
    #prev:hover,#next:hover{background:rgba(255,255,255,0.4);}
  </style>
</head>
<body>
<section class="gallery-section">
  <h2>Our Premium Taxi Fleet</h2>
  <p>Explore the high-quality cars used by BrajCab for Mathura and Vrindavan airport transfers, temple tours, pilgrimage travel and local sightseeing.</p>
  <div class="gallery-grid">
    <img src="photos/car1.jpg" alt="Luxury Taxi" class="gallery-img">
    <img src="photos/car2.jpg" alt="Comfortable Cab" class="gallery-img">
    <img src="photos/car3.jpg" alt="Reliable Transport" class="gallery-img">
    <img src="photos/car4.jpg" alt="Premium Service" class="gallery-img">
    <img src="photos/car6.jpg" alt="Airport Transfer" class="gallery-img">
    <img src="photos/car7.jpg" alt="Sightseeing Tour" class="gallery-img">
    <img src="photos/car8.jpg" alt="Temple Tour" class="gallery-img">
    <img src="photos/car9.jpg" alt="Local Taxi" class="gallery-img">
    <img src="photos/car10.jpg" alt="VIP Ride" class="gallery-img">
    <img src="photos/car11.jpg" alt="Wedding Transport" class="gallery-img">
    <img src="photos/car12.jpg" alt="Group Booking" class="gallery-img">
    <img src="photos/car13.jpg" alt="24/7 Service" class="gallery-img">
    <img src="photos/car14.jpg" alt="Safe Journey" class="gallery-img">
    <img src="photos/car15.jpg" alt="Comfortable Seats" class="gallery-img">
    <img src="photos/car16.jpg" alt="Modern Fleet" class="gallery-img">
    <img src="photos/car18.jpg" alt="Affordable Rates" class="gallery-img">
    <img src="photos/car19.jpg" alt="Customer Satisfaction" class="gallery-img">
    <img src="photos/car20.jpg" alt="Licensed Drivers" class="gallery-img">
  </div>
</section>
<div id="lightbox">
  <span id="close">&times;</span>
  <img id="lightbox-img">
  <button id="prev">&#10094;</button>
  <button id="next">&#10095;</button>
</div>
<script>
const images = document.querySelectorAll('.gallery-img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
let currentIndex = 0;
images.forEach((img,index)=>{img.addEventListener('click',()=>{currentIndex=index;openLightbox();});});
function openLightbox(){lightbox.style.display='flex';lightboxImg.src=images[currentIndex].src;}
document.getElementById('close').onclick = ()=> lightbox.style.display='none';
document.getElementById('prev').onclick = ()=>{currentIndex=(currentIndex-1+images.length)%images.length;lightboxImg.src=images[currentIndex].src;};
document.getElementById('next').onclick = ()=>{currentIndex=(currentIndex+1)%images.length;lightboxImg.src=images[currentIndex].src;};
lightbox.addEventListener('click', e=>{if(e.target===lightbox) lightbox.style.display='none';});
</script>
</body>
</html>
